<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="glow" x1="300" y1="100" x2="500" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="160" fill="url(#glow)"/>
  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="200" cy="100" r="12" fill="url(#node)" opacity="0.9"/>
  <circle cx="200" cy="170" r="12" fill="url(#node)" opacity="0.9"/>
  <circle cx="200" cy="240" r="12" fill="url(#node)" opacity="0.9"/>
  <circle cx="200" cy="310" r="12" fill="url(#node)" opacity="0.9"/>
  <!-- Hidden layer 1 -->
  <circle cx="340" cy="120" r="14" fill="url(#node)" opacity="0.8"/>
  <circle cx="340" cy="200" r="14" fill="url(#node)" opacity="0.8"/>
  <circle cx="340" cy="280" r="14" fill="url(#node)" opacity="0.8"/>
  <!-- Hidden layer 2 -->
  <circle cx="470" cy="140" r="14" fill="url(#node)" opacity="0.8"/>
  <circle cx="470" cy="220" r="14" fill="url(#node)" opacity="0.8"/>
  <circle cx="470" cy="300" r="14" fill="url(#node)" opacity="0.8"/>
  <!-- Output layer -->
  <circle cx="600" cy="160" r="12" fill="url(#node)" opacity="0.9"/>
  <circle cx="600" cy="240" r="12" fill="url(#node)" opacity="0.9"/>
  <!-- Connections input->hidden1 -->
  <line x1="212" y1="100" x2="326" y2="120" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="212" y1="100" x2="326" y2="200" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="212" y1="170" x2="326" y2="120" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="212" y1="170" x2="326" y2="200" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="212" y1="170" x2="326" y2="280" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="212" y1="240" x2="326" y2="200" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="212" y1="240" x2="326" y2="280" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="212" y1="310" x2="326" y2="280" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="212" y1="310" x2="326" y2="200" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <!-- Connections hidden1->hidden2 -->
  <line x1="354" y1="120" x2="456" y2="140" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <line x1="354" y1="120" x2="456" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="354" y1="200" x2="456" y2="140" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="354" y1="200" x2="456" y2="220" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <line x1="354" y1="200" x2="456" y2="300" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="354" y1="280" x2="456" y2="220" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="354" y1="280" x2="456" y2="300" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <!-- Connections hidden2->output -->
  <line x1="484" y1="140" x2="588" y2="160" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <line x1="484" y1="140" x2="588" y2="240" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="484" y1="220" x2="588" y2="160" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="484" y1="220" x2="588" y2="240" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <line x1="484" y1="300" x2="588" y2="240" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <!-- Orbital rings for "science" feel -->
  <ellipse cx="400" cy="200" rx="280" ry="60" stroke="#6366f1" stroke-width="0.8" opacity="0.15" transform="rotate(-15 400 200)"/>
  <ellipse cx="400" cy="200" rx="280" ry="60" stroke="#818cf8" stroke-width="0.8" opacity="0.12" transform="rotate(25 400 200)"/>
  <!-- Small accent dots -->
  <circle cx="130" cy="60" r="3" fill="#c7d2fe" opacity="0.4"/>
  <circle cx="680" cy="50" r="2" fill="#c7d2fe" opacity="0.3"/>
  <circle cx="720" cy="340" r="3" fill="#c7d2fe" opacity="0.35"/>
  <circle cx="80" cy="350" r="2" fill="#c7d2fe" opacity="0.3"/>
  <circle cx="650" cy="120" r="2" fill="#a5b4fc" opacity="0.25"/>
  <circle cx="150" cy="280" r="2" fill="#a5b4fc" opacity="0.25"/>
</svg>
